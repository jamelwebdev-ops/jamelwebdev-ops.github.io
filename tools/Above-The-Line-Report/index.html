<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Above The Line Report | Jamel Moyano</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 60px 24px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .back {
            display: inline-block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            margin-bottom: 32px;
            transition: color 0.2s;
        }

        .back:hover { color: #fff; }

        .page-label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #e94560;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .page-desc {
            font-size: 16px;
            font-weight: 300;
            color: rgba(255,255,255,0.5);
            margin-bottom: 48px;
        }

        .content {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 40px 32px;
        }

        .content h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .content p {
            font-size: 15px;
            line-height: 1.7;
            color: rgba(255,255,255,0.7);
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/tools/" class="back">&larr; Back to tools</a>
        <div class="page-label">Report</div>
        <h1>Above The Line Report</h1>
        <p class="page-desc">Above the line analysis and insights.</p>

        <div class="content">
            <h2>Coming Soon</h2>
            <p>This report is currently being built. Check back soon for the full above-the-line analysis.</p>
        </div>
    </div>
</body>
</html>
